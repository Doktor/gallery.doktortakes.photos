server {
    listen 443 ssl;
    server_name 127.0.0.1 localhost;

    ssl_protocols TLSv1.1 TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers 'EECDH+AESGCM:EDH+AESGCM:AES256+EECDH:AES256+EDH';
    ssl_certificate /app/ssl/certificate.pem;
    ssl_certificate_key /app/ssl/key.pem;

    access_log /app/logs/nginx_access.log;
    error_log /app/logs/nginx_error.log error;
    error_log /app/logs/nginx_critical.log crit;

    location / {
        proxy_pass http://backend:1337;

        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_redirect off;

        client_max_body_size 50M;
    }

    location ~* \.(py|pyc|html|scss|db|log|json)$ {
        return 404;
    }

    location /static/ {
        alias /app/static.1/;
    }
}
