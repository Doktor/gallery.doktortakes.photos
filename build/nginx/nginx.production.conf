server {
    listen 80;
    server_name doktortakes.photos www.doktortakes.photos;

    return 301 https://doktortakes.photos$request_uri;
}

server {
    listen 443 ssl;
    server_name doktortakes.photos;

    ssl_protocols TLSv1.1 TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers 'EECDH+AESGCM:EDH+AESGCM:AES256+EECDH:AES256+EDH';
    ssl_certificate /etc/letsencrypt/live/doktortakes.photos/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/doktortakes.photos/privkey.pem;

    access_log /home/doktor/doktortakes.photos/logs/nginx_access.log;
    error_log /home/doktor/doktortakes.photos/logs/nginx_error.log error;
    error_log /home/doktor/doktortakes.photos/logs/nginx_critical.log crit;

    location ~* \.(py|pyc|html|scss|db|log|json)$ {
        return 404;
    }

    location / {
        proxy_pass http://localhost:1337;

        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_redirect off;

        client_max_body_size 50M;
    }

    location /static/ {
        alias /home/doktor/doktortakes.photos/static.1/;
    }

    location /.well-known/ {
        alias /home/doktor/doktortakes.photos/.well-known/;
    }
}
