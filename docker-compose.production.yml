version: '3.8'

services:
  backend:
    image: photos_backend
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    command: poetry run gunicorn photos.wsgi -c ./build/gunicorn.conf.py
    ports:
      - 1337:1337
    depends_on:
      - redis

  redis:
    extends:
      file: docker-services.yml
      service: redis

  celery:
    extends:
      file: docker-services.yml
      service: celery
    build:
      target: production
    depends_on:
      - backend
      - redis
