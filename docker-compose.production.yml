version: '3.8'

services:
  backend:
    image: photos_backend
    container_name: backend
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    command: poetry run gunicorn photos.wsgi -c ./build/gunicorn.conf.py
    ports:
      - 1337:1337
    env_file:
      - ./.env.prod
    volumes:
      - ./static.1/:/app/static.1/
    depends_on:
      - redis

  redis:
    extends:
      file: docker-services.yml
      service: redis

  celery:
    extends:
      file: docker-services.yml
      service: celery
    build:
      target: production
    env_file:
      - ./.env.prod
    depends_on:
      - backend
      - redis
