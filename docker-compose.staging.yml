version: '3.8'

services:
  backend:
    image: photos_backend
    container_name: backend
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    command: poetry run gunicorn photos.wsgi -c ./build/gunicorn.conf.py
    expose:
      - 1337
    env_file:
      - ./.env.prod
    volumes:
      - static_volume:/app/static.1/
    depends_on:
      - redis

  nginx:
    image: photos_nginx
    container_name: nginx
    build: ./build/nginx/
    ports:
      - 443:443
    depends_on:
      - backend
    volumes:
      - static_volume:/app/static.1/

  redis:
    image: redis:6.2-alpine
    container_name: redis

  celery:
    image: photos_celery
    container_name: celery
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    command: poetry run celery -A photos worker --loglevel=INFO
    env_file:
      - ./.env.dev
    depends_on:
      - backend
      - redis

volumes:
  static_volume:
