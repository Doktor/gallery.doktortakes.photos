version: '3.8'

services:
  backend:
    image: photos_backend
    container_name: backend
    build:
      context: .
      dockerfile: Dockerfile
      target: staging
    command: poetry run gunicorn photos.wsgi -c ./build/gunicorn.conf.py
    expose:
      - 1337
    depends_on:
      - redis

  nginx:
    image: photos_nginx
    container_name: nginx
    build: ./build/nginx/
    ports:
      - 443:443
    depends_on:
      - backend

  redis:
    extends:
      file: docker-services.yml
      service: redis

  celery:
    extends:
      file: docker-services.yml
      service: celery
    build:
      target: staging
    depends_on:
      - backend
      - redis
