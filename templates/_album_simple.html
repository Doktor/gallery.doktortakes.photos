{% load staticfiles %}
<li>
  <a href="{{ album.get_absolute_url }}">{{ album.name }}</a>

  {% if children %}
  <ul class="album-list-simple-items">
    {% for a, a_children in children %}
    {% with album=a children=a_children template="_album_simple.html" %}
      {% include template %}
    {% endwith %}
    {% endfor %}
  </ul>
  {% endif %}
</li>
