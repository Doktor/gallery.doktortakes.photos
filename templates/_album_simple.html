{% load staticfiles %}
<li>
  <a href="{{ album.get_absolute_url }}">{{ album.name }}</a>

  {% if album.children.exists %}
    <ul class="list">
      {% for a in album.children.all %}
        {% with album=a template="_album_simple.html" %}
          {% include template %}
        {% endwith %}
      {% endfor %}
    </ul>
  {% endif %}
</li>
