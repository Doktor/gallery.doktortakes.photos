services:
  backend:
    image: photos_backend
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    ports:
      - 8000:8000
    volumes:
      - media_files:/app/media/
      - ./api/photos/:/app/api/photos/
      - static_volume:/app/api/static/
    depends_on:
      - database
    entrypoint: /app/run.dev.sh

  frontend:
    image: photos_frontend
    build:
      context: .
      dockerfile: Dockerfile
      target: node
    depends_on:
      - backend
    volumes:
      - ./ui/src/:/app/ui/src/
      - static_volume:/app/ui/static/
    entrypoint: npx webpack --config webpack.dev.js

  database:
    extends:
      file: docker-services.yml
      service: database
    volumes:
      - postgres_data:/var/lib/postgresql/data/
      - ./build/database/init.sql:/docker-entrypoint-initdb.d/init.sql

volumes:
  media_files:
  postgres_data:
  static_volume:
