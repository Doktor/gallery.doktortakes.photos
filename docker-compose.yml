services:
  backend:
    image: photos-backend
    build:
      context: .
      dockerfile: Dockerfile
      target: backend-development
    env_file: .env
    ports:
      - 8000:8000
    volumes:
      - media_files:/app/media/
      - ./api/photos/:/app/api/photos/
    depends_on:
      - database
    entrypoint: /app/run.dev.sh

  frontend:
    image: photos-frontend
    build:
      context: .
      dockerfile: Dockerfile
      target: frontend
    ports:
      - 5173:5173
    volumes:
      - ./ui/src/:/app/ui/src/
    entrypoint: npx vite --host

  database:
    extends:
      file: docker-services.yml
      service: database
    volumes:
      - postgres_data:/var/lib/postgresql/data/
      - ./build/database/init.sql:/docker-entrypoint-initdb.d/init.sql

volumes:
  media_files:
  postgres_data:
