version: '3.8'

services:
  backend:
    image: photos_backend
    container_name: backend
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    command: /app/run.dev.sh
    ports:
      - 8000:8000
    volumes:
      - ./photos/:/app/photos/
      - static_volume:/app/static/
    environment:
      - DATABASE_HOST=db
      - DATABASE_PORT=5432
      - DATABASE_ENGINE=django.db.backends.postgresql
      - DATABASE_USER=photos
      - DATABASE_PASSWORD=photos
      - DATABASE_NAME=photos
    depends_on:
      - db
      - redis

  frontend:
    image: photos_frontend
    container_name: frontend
    build:
      context: .
      dockerfile: ./build/webpack/Dockerfile
    depends_on:
      - backend
    volumes:
      - ./src/:/app/src/
      - ./node_modules/:/app/node_modules/
      - static_volume:/app/static/
    command: npx webpack --config webpack.dev.js

  redis:
    extends:
      file: docker-services.yml
      service: redis

  celery:
    extends:
      file: docker-services.yml
      service: celery
    build:
      target: development
    environment:
      - DATABASE_HOST=db
      - DATABASE_PORT=5432
      - DATABASE_ENGINE=django.db.backends.postgresql
      - DATABASE_USER=photos
      - DATABASE_PASSWORD=photos
      - DATABASE_NAME=photos
    depends_on:
      - backend
      - db
      - redis

  db:
    image: postgres:10.20-alpine
    container_name: db
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    # https://github.com/docker-library/docs/blob/master/postgres/README.md#environment-variables
    environment:
      - POSTGRES_USER=photos
      - POSTGRES_PASSWORD=photos
      - POSTGRES_DB=photos

volumes:
  postgres_data:
  static_volume:
